# ── Prefix ──────────────────────────────────────────────────
# Default is Ctrl+b (same as tmux). Uncomment to use Ctrl+a:
# set -g prefix C-a

# ── General ─────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
set -g history-limit 10000
set -g cursor-style bar
set -g cursor-blink on

# ── Default Shell ───────────────────────────────────────────
set -g default-shell pwsh

# ── Claude Code ─────────────────────────────────────────────
# Injects --teammate-mode tmux via wrapper function and sets
# PSMUX_CLAUDE_TEAMMATE_MODE=tmux in every pane.
# Default is on. Uncomment to disable:
# set -g claude-code-fix-tty off

# ── Status Bar ──────────────────────────────────────────────
set -g status-left "[#S] "
set -g status-right "%H:%M %d-%b-%y"
set -g status-style "bg=colour235,fg=colour136"

# ── Rendering ───────────────────────────────────────────────
# set -g prediction-dimming off

# ── Key Bindings ────────────────────────────────────────────
bind-key -T prefix h split-window -h
bind-key -T prefix v split-window -v